kind = "web"
previewPath = "/"
title = "PrizePicks Analytics"
version = "1.0.0"
id = "artifacts/prizepicks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24892

[services.development]
run = "pnpm --filter @workspace/prizepicks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prizepicks", "run", "build" ]
publicDir = "artifacts/prizepicks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24892"
BASE_PATH = "/"
